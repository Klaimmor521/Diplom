# Файл: .streamlit/config.toml

[theme]
# Акцент — свежий мятный / бирюзовый
primaryColor="#10B981"

# Фон — очень тёмный зелёный/синий, почти чёрный
backgroundColor="#0D1B1E"

# Вторичный фон — тёмно-серый с зелёным подтоном
secondaryBackgroundColor="#192A2F"

# Текст — светло-серый (чисто белый может быть слишком резким на этом фоне)
textColor="#E2E8F0"

# Шрифт
font="sans serif"